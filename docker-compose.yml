services:
  postgres:
    image: postgres:16-alpine
    container_name: ccy-canvas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ccy_canvas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ccy_canvas"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
