# Example nginx site config for CCY Canvas.
# Copy to /etc/nginx/conf.d/ccy-canvas.conf, edit `root` path, then:
#   sudo nginx -t && sudo nginx -s reload

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Frontend static files
    root /opt/ccy-canvas/dist;
    index index.html;

    # Static asset caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Task-completion SSE stream. Keep this explicit so reconnecting
    # EventSource clients don't get buffered by nginx.
    location = /api/app/tasks/stream {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 30s;
        proxy_send_timeout    3600s;
        proxy_read_timeout    3600s;
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering no;
    }

    # API reverse-proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Generation jobs (video) can run up to 10 minutes; bump timeouts.
        proxy_connect_timeout 30s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;

        # Match backend upload cap.
        client_max_body_size 60M;

        # Buffer off for streaming-friendly behavior.
        proxy_buffering off;
    }

    # Uploaded files (served by backend; nginx adds long cache).
    location /uploads/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — let React Router handle unknown routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
